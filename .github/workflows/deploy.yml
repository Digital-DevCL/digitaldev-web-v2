# Pipeline CI/CD para el sitio corporativo digitaldev-web-v2
#
# Flujo de aprobación para el equipo de marketing:
#   push a `preview`  → build + deploy automático a preview.digital-dev.cl (namespace web-staging)
#   push a `main`     → build + deploy a www.digital-dev.cl (namespace web-prod)
#   `main` solo se actualiza vía PR con 1 aprobación (branch protection) — mkt no
#   puede publicar en producción sin que alguien revise el preview primero.
#
# Secrets requeridos en GitHub (Settings → Secrets → Actions):
#   DO_REGISTRY_TOKEN   — token DO con permisos: registry (read/write)
#   KUBECONFIG_B64      — kubeconfig del cluster en base64

name: Deploy Sitio Digital-Dev

on:
  push:
    branches:
      - main       # → web-prod
      - preview    # → web-staging

env:
  REGISTRY: registry.digitalocean.com/digital-dev

jobs:
  build:
    name: Build & Push
    runs-on: ubuntu-latest
    outputs:
      image_tag: ${{ steps.meta.outputs.tag }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set image tag
        id: meta
        run: |
          SHA=$(echo $GITHUB_SHA | head -c7)
          echo "tag=$SHA" >> $GITHUB_OUTPUT

      - name: Login to DOCR
        uses: docker/login-action@v3
        with:
          registry: registry.digitalocean.com
          username: ${{ secrets.DO_REGISTRY_TOKEN }}
          password: ${{ secrets.DO_REGISTRY_TOKEN }}

      - name: Build & push sitio
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ${{ env.REGISTRY }}/web/site:${{ steps.meta.outputs.tag }}
            ${{ env.REGISTRY }}/web/site:latest

  deploy-prod:
    name: Deploy → prod (www.digital-dev.cl)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/main'
    environment: production

    steps:
      - name: Setup kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Deploy
        run: |
          kubectl set image deployment/web \
            web=${{ env.REGISTRY }}/web/site:${{ needs.build.outputs.image_tag }} \
            -n web-prod
          kubectl rollout status deployment/web -n web-prod --timeout=120s

  deploy-staging:
    name: Deploy → preview (preview.digital-dev.cl)
    needs: build
    runs-on: ubuntu-latest
    if: github.ref == 'refs/heads/preview'
    environment: staging

    steps:
      - name: Setup kubectl
        run: |
          echo "${{ secrets.KUBECONFIG_B64 }}" | base64 -d > /tmp/kubeconfig
          echo "KUBECONFIG=/tmp/kubeconfig" >> $GITHUB_ENV

      - name: Deploy
        run: |
          kubectl set image deployment/web \
            web=${{ env.REGISTRY }}/web/site:${{ needs.build.outputs.image_tag }} \
            -n web-staging
          kubectl rollout status deployment/web -n web-staging --timeout=120s
